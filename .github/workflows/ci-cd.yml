name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_local_services
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_local_services
        run: |
          pip install pytest pytest-asyncio
          pytest tests/ -v --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  build-and-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Development
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
      
      - name: Initialize Terraform with S3 backend
        run: |
          cd terraform
          terraform init -reconfigure \
            -backend-config="bucket=local-services-terraform-state" \
            -backend-config="key=local-services/development/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Plan and Apply
        run: |
          cd terraform
          terraform plan -var-file="dev.tfvars" -out=tfplan
          terraform apply -auto-approve tfplan
      
      - name: Get deployment outputs
        run: |
          cd terraform
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_ENV
          echo "INSTANCE_ID=$(terraform output -raw ec2_instance_id)" >> $GITHUB_ENV
          echo "RDS_ADDRESS=$(terraform output -raw rds_address)" >> $GITHUB_ENV
          echo "RDS_DB_NAME=$(terraform output -raw rds_database_name)" >> $GITHUB_ENV
          echo "RDS_USERNAME=$(terraform output -raw rds_username)" >> $GITHUB_ENV
          echo "DB_SECRET_ARN=$(terraform output -raw db_password_secret_arn)" >> $GITHUB_ENV

      - name: Fetch DB password from Secrets Manager
        run: |
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query 'SecretString' --output text)
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      - name: Wait for SSM agent
        run: |
          echo "Waiting for SSM agent on $INSTANCE_ID..."
          for i in {1..20}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then echo "SSM agent online."; break; fi
            echo "Waiting... ($i/20)"
            sleep 15
          done

      - name: Ensure Docker is installed via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["rm -f /etc/apt/sources.list.d/docker.list /etc/apt/sources.list.d/docker.list.save; if ! command -v docker &>/dev/null; then echo Docker not found, installing...; apt-get update -y && DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io curl && systemctl enable docker && systemctl start docker && echo Docker installed successfully; else echo Docker already installed: $(docker --version); fi"]' \
            --timeout-seconds 180 \
            --comment "Ensure Docker installed" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" 2>/dev/null || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query '[StandardOutputContent, StandardErrorContent]' --output text

      - name: Create .env file on instance via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"mkdir -p /opt/local-services-app && cat > /opt/local-services-app/.env << 'ENVEOF'\nDATABASE_URL=postgresql://${RDS_USERNAME}:${DB_PASSWORD}@${RDS_ADDRESS}:5432/${RDS_DB_NAME}\nSECRET_KEY=$(openssl rand -hex 32)\nALGORITHM=HS256\nACCESS_TOKEN_EXPIRE_MINUTES=30\nENVIRONMENT=production\nENVEOF\nchmod 600 /opt/local-services-app/.env && echo .env file created successfully\"]" \
            --timeout-seconds 30 \
            --comment "Create .env file" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" 2>/dev/null || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query '[StandardOutputContent, StandardErrorContent]' --output text

      - name: Deploy Docker container via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker pull ghcr.io/pranayyy/myrepo:main && docker stop local-services-api 2>/dev/null; docker rm local-services-api 2>/dev/null; docker run -d --name local-services-api --restart always --network host --env-file /opt/local-services-app/.env ghcr.io/pranayyy/myrepo:main && sleep 5 && curl -sf http://localhost:8000/health && echo DEPLOY_SUCCESS || (docker logs local-services-api --tail 30 && echo DEPLOY_FAILED)"]' \
            --timeout-seconds 300 \
            --comment "Deploy dev" \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" 2>/dev/null || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query '[StandardOutputContent, StandardErrorContent]' --output text
      
      - name: Verify deployment
        run: |
          sleep 10
          curl -sf "$API_URL/health" && echo "Dev deployment healthy!" || echo "Dev health check failed"

  deploy-prod:
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy to Production
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
      
      - name: Initialize Terraform with S3 backend
        run: |
          cd terraform
          terraform init -reconfigure \
            -backend-config="bucket=local-services-terraform-state" \
            -backend-config="key=local-services/production/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Plan and Apply
        run: |
          cd terraform
          terraform plan -var-file="prod.tfvars" -out=tfplan
          terraform apply -auto-approve tfplan
      
      - name: Get deployment outputs
        run: |
          cd terraform
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_ENV
          echo "INSTANCE_ID=$(terraform output -raw ec2_instance_id)" >> $GITHUB_ENV
          echo "RDS_ADDRESS=$(terraform output -raw rds_address)" >> $GITHUB_ENV
          echo "RDS_DB_NAME=$(terraform output -raw rds_database_name)" >> $GITHUB_ENV
          echo "RDS_USERNAME=$(terraform output -raw rds_username)" >> $GITHUB_ENV
          echo "DB_SECRET_ARN=$(terraform output -raw db_password_secret_arn)" >> $GITHUB_ENV

      - name: Fetch DB password from Secrets Manager
        run: |
          DB_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query 'SecretString' --output text)
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      - name: Wait for SSM agent
        run: |
          echo "Waiting for SSM agent on $INSTANCE_ID..."
          for i in {1..20}; do
            STATUS=$(aws ssm describe-instance-information \
